<!DOCTYPE html>
<html>
<head>
  <title>LMS Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      background: #f8fafc;
    }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      background: #020617;
      color: white;
      height: 100vh;
      padding: 20px;
    }

    .sidebar h2 {
      color: #38bdf8;
      margin-bottom: 30px;
    }

    .sidebar a {
      display: block;
      color: #94a3b8;
      text-decoration: none;
      margin: 10px 0;
      padding: 8px;
      border-radius: 6px;
    }

    .sidebar a:hover {
      background: #1e293b;
      color: white;
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 30px;
    }

    h1 {
      margin-bottom: 20px;
    }

    /* CARDS */
    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 14px;
      text-align: center;
      box-shadow: 0 6px 15px rgba(0,0,0,0.05);
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.08);
    }

    .card h2 {
      margin: 0;
      font-size: 26px;
    }

    .card p {
      color: #64748b;
      margin-top: 5px;
    }

    /* TABLE */
    table {
      width: 100%;
      margin-top: 25px;
      background: white;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 6px 15px rgba(0,0,0,0.05);
    }

    th {
      background: #38bdf8;
      color: white;
    }

    th, td {
      padding: 12px;
      text-align: left;
    }

    tr:nth-child(even) {
      background: #f1f5f9;
    }

    tr:hover {
      background: #e2e8f0;
    }

    h2 {
      margin-top: 30px;
    }
  </style>

</head>

<body>

<div class="sidebar">
  <h2>LMS</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="students.html">Students</a>
  <a href="grades.html">Grades</a>
</div>

<div class="main">
  <h1>Dashboard</h1>

  <div class="cards">
    <div class="card">
      <h2>120</h2>
      <p>Students</p>
    </div>

    <div class="card">
      <h2>5</h2>
      <p>Courses</p>
    </div>

    <div class="card">
      <h2>95%</h2>
      <p>Attendance</p>
    </div>

    <div class="card">
      <h2>10</h2>
      <p>Teachers</p>
    </div>
  </div>

  <h2>Courses</h2>

  <table>
    <tr>
      <th>Course</th>
      <th>Students</th>
    </tr>

    <tr>
      <td>Grade 10 - ICT</td>
      <td>30</td>
    </tr>

    <tr>
      <td>Grade 11 - STEM</td>
      <td>25</td>
    </tr>

  </table>
</div>

</body>
</html>
