<!DOCTYPE html>
<html>
<head>
  <title>Repair Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      background: #f8fafc;
    }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      background: #020617;
      color: white;
      height: 100vh;
      padding: 20px;
    }

    .sidebar h2 {
      color: #38bdf8;
      margin-bottom: 30px;
    }

    .sidebar a {
      display: block;
      color: #94a3b8;
      text-decoration: none;
      margin: 10px 0;
      padding: 8px;
      border-radius: 6px;
    }

    .sidebar a:hover {
      background: #1e293b;
      color: white;
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 30px;
    }

    h1 {
      margin-bottom: 20px;
    }

    /* CARDS */
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 14px;
      text-align: center;
      box-shadow: 0 6px 15px rgba(0,0,0,0.05);
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.08);
    }

    .card h2 {
      margin: 0;
      font-size: 26px;
    }

    .card p {
      color: #64748b;
      margin-top: 5px;
    }

    /* TABLE */
    table {
      width: 100%;
      margin-top: 25px;
      background: white;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 6px 15px rgba(0,0,0,0.05);
    }

    th {
      background: #38bdf8;
      color: white;
    }

    th, td {
      padding: 12px;
      text-align: left;
    }

    tr:nth-child(even) {
      background: #f1f5f9;
    }

    tr:hover {
      background: #e2e8f0;
    }

    /* STATUS COLORS */
    .pending {
      color: #f59e0b;
      font-weight: bold;
    }

    .done {
      color: #22c55e;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>RepairSys</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="jobs.html">Jobs</a>
  <a href="customers.html">Customers</a>
</div>

<div class="main">

  <h1>Dashboard</h1>

  <div class="cards">
    <div class="card">
      <h2 id="total">2</h2>
      <p>Total Jobs</p>
    </div>

    <div class="card">
      <h2 id="pending">1</h2>
      <p>Pending</p>
    </div>

    <div class="card">
      <h2 id="done">1</h2>
      <p>Completed</p>
    </div>
  </div>

  <h3 style="margin-top:30px;">Recent Jobs</h3>

  <table>
    <tr>
      <th>Customer</th>
      <th>Device</th>
      <th>Status</th>
    </tr>

    <tr>
      <td>Juan Dela Cruz</td>
      <td>iPhone</td>
      <td class="pending">Pending</td>
    </tr>

    <tr>
      <td>Maria Santos</td>
      <td>Laptop</td>
      <td class="done">Done</td>
    </tr>

  </table>

</div>

</body>
</html>
