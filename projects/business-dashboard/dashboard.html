<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Modern Business Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: Inter, sans-serif;
  background:#0f172a;
  color:white;
  display:flex;
  min-height:100vh;
}

/* SIDEBAR */

.sidebar{
  width:240px;
  background:rgba(15,23,42,.9);
  backdrop-filter:blur(10px);
  border-right:1px solid rgba(255,255,255,.05);
  padding:30px 20px;
}

.logo{
  font-size:24px;
  font-weight:700;
  margin-bottom:40px;
  color:#38bdf8;
}

.sidebar a{
  display:block;
  text-decoration:none;
  color:#94a3b8;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  transition:.3s;
}

.sidebar a:hover{
  background:#1e293b;
  color:white;
}

/* MAIN */

.main{
  flex:1;
  padding:30px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.topbar h1{
  font-size:32px;
}

.topbar p{
  color:#94a3b8;
}

/* CARDS */

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-bottom:30px;
}

.card{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(10px);
  padding:25px;
  border-radius:20px;
  transition:.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.card h2{
  font-size:35px;
  margin-bottom:8px;
}

.card p{
  color:#94a3b8;
}

/* CHART */

.chart-box{
  background:rgba(255,255,255,.05);
  padding:25px;
  border-radius:20px;
  margin-bottom:30px;
}

/* FORM */

.form-box{
  background:rgba(255,255,255,.05);
  padding:25px;
  border-radius:20px;
  margin-bottom:30px;
}

.form-box h3{
  margin-bottom:15px;
}

.form-group{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

input{
  flex:1;
  min-width:200px;
  padding:14px;
  border:none;
  outline:none;
  border-radius:12px;
  background:#1e293b;
  color:white;
}

button{
  padding:14px 20px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#38bdf8,#6366f1);
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:.3s;
}

button:hover{
  transform:scale(1.03);
}

/* TABLE */

.table-box{
  background:rgba(255,255,255,.05);
  padding:20px;
  border-radius:20px;
  overflow:auto;
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  text-align:left;
  padding:15px;
  color:#38bdf8;
  font-size:14px;
}

td{
  padding:15px;
  border-top:1px solid rgba(255,255,255,.05);
}

select{
  padding:10px;
  border-radius:10px;
  border:none;
  background:#1e293b;
  color:white;
}

.done{
  background:rgba(34,197,94,.1);
}

@media(max-width:768px){

  body{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
    height:auto;
  }

}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

  <div class="logo">BizSys</div>

  <a href="#">Dashboard</a>
  <a href="#">Analytics</a>
  <a href="#">Transactions</a>
  <a href="#">Settings</a>

</div>

<!-- MAIN -->

<div class="main">

  <div class="topbar">
    <div>
      <h1>Automation Dashboard</h1>
      <p>Manage business operations efficiently</p>
    </div>
  </div>

  <!-- CARDS -->

  <div class="cards">

    <div class="card">
      <h2 id="sales">0</h2>
      <p>Total Sales</p>
    </div>

    <div class="card">
      <h2 id="jobs">0</h2>
      <p>Total Jobs</p>
    </div>

    <div class="card">
      <h2 id="done">0</h2>
      <p>Completed</p>
    </div>

  </div>

  <!-- CHART -->
<div style="
width:350px;
margin:auto;
">
  <canvas id="chart"></canvas>
</div>

  <!-- FORM -->

  <div class="form-box">

    <h3>Add Transaction</h3>

    <div class="form-group">
      <input id="customer" placeholder="Customer Name">
      <input id="amount" placeholder="Amount">
      <button onclick="addTransaction()">Add</button>
    </div>

  </div>

  <!-- TABLE -->

  <div class="table-box">
    <table id="table"></table>
  </div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("biz")) || [];
let chart;

function render() {

  let table = document.getElementById("table");

  table.innerHTML = `
    <tr>
      <th>Customer</th>
      <th>Amount</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  `;

  let totalSales = 0;
  let completed = 0;

  data.forEach((d,index)=>{

    totalSales += parseInt(d.amount);

    if(d.status === "Done") completed++;

    let row = table.insertRow();

    if(d.status === "Done"){
      row.classList.add("done");
    }

    row.innerHTML = `
      <td>${d.customer}</td>
      <td>₱${d.amount}</td>

      <td>
        <select onchange="changeStatus(${index}, this.value)">
          <option ${d.status==="Pending" ? "selected":""}>Pending</option>
          <option ${d.status==="Done" ? "selected":""}>Done</option>
        </select>
      </td>

      <td>
        <button onclick="deleteItem(${index})">Delete</button>
      </td>
    `;

  });

  document.getElementById("sales").innerText = "₱" + totalSales;
  document.getElementById("jobs").innerText = data.length;
  document.getElementById("done").innerText = completed;

  localStorage.setItem("biz", JSON.stringify(data));

  renderChart();

}

function addTransaction(){

  let customer = document.getElementById("customer").value;
  let amount = document.getElementById("amount").value;

  if(!customer || !amount){
    alert("Complete all fields");
    return;
  }

  data.push({
    customer,
    amount,
    status:"Pending"
  });

  document.getElementById("customer").value="";
  document.getElementById("amount").value="";

  render();

}

function changeStatus(index,value){

  data[index].status = value;
  render();

}

function deleteItem(index){

  data.splice(index,1);
  render();

}

function renderChart(){

  let done = data.filter(d=>d.status==="Done").length;
  let pending = data.filter(d=>d.status==="Pending").length;

  let ctx = document.getElementById("chart");

  if(chart) chart.destroy();

  chart = new Chart(ctx, {

    type:'doughnut',

    data:{
      labels:['Done','Pending'],
      datasets:[{
        data:[done,pending]
      }]
    },

    options:{
      responsive:true,
      plugins:{
        legend:{
          labels:{
            color:"white"
          }
        }
      }
    }

  });

}

render();

</script>

</body>
</html>
